default:
  logger:
    log_level: "INFO"
  service:
    host: "0.0.0.0"
    port: 6006
    cert_file: "ssl_certs/localhost.crt"
    cert_key: "ssl_certs/localhost.key"
  chat_engine:
    model_root: "models"
    concurrent_limit: 1
    handler_search_path:
      - "src/handlers"
    handler_configs:
      WsClient:
        module: client/ws_client/ws_client_handler
        connection_ttl: 900
        heartbeat_timeout: 30
      InterruptHandler:
        module: logic/interrupt/interrupt_handler
      SileroVad:
        module: vad/silerovad/vad_handler_silero
        speaking_threshold: 0.25
        start_delay: 512
        end_delay: 2400
        buffer_look_back: 2048
        speech_padding: 512
        volume_threshold: -55
      SenseVoice:
        enabled: True
        module: asr/sensevoice/asr_handler_sensevoice
        model_name: "iic/SenseVoiceSmall"
      CosyVoice:
        enabled: True
        module: tts/bailian_tts/tts_handler_cosyvoice_bailian
        voice: "longxiaochun"
        model_name: "cosyvoice-v1"
      LLMOpenAICompatible:
        enabled: True
        module: llm/openai_compatible/llm_handler_openai_compatible
        model_name: "qwen-plus"
        enable_video_input: False
        history_length: 20
        api_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
