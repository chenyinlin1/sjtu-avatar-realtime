default:
  logger:
    log_level: "INFO"
  service:
    host: "0.0.0.0"
    port: 6006
    cert_file: "ssl_certs/localhost.crt"
    cert_key: "ssl_certs/localhost.key"
  history:
    retention_mode: "by_both"
    max_events: 1000
    max_age_seconds: 3600
    cleanup_interval_seconds: 30
  chat_engine:
    model_root: "models"
    concurrent_limit: 1  # FlashHead GPU 显存占用较高，建议单路
    handler_search_path:
      - "src/handlers"
    handler_configs:
      RtcClient:
        module: client/rtc_client/client_handler_rtc
        # max time a session will last for
        connection_ttl: 900
        output_video_fps: 25  # Must match FlashHead fps (25) for correct A/V sync
        input_video_enabled: True
        turn_config:
          turn_provider: turn_server
          urls:
            - "stun:stun.l.google.com:19302"
            - "turn:115.159.81.115:3478?transport=udp"
            - "turn:115.159.81.115:3478?transport=tcp"
          username: "turnuser"
          credential: "Abc_2026_Turn_x9Kp7"
      # === 打断处理器 - 接收 INTERRUPT 信号并执行流取消 ===
      InterruptHandler:
        module: logic/interrupt/interrupt_handler
      SileroVad:
        module: vad/silerovad/duplex_vad_handler
        speaking_threshold: 0.25
        start_delay: 1024
        end_delay: 32000
        early_end_delay: 5000
        early_end_repeat_delay: 1000
        buffer_look_back: 2048
        speech_padding: 512
        volume_threshold: -50
        post_end_monitor_samples: 8000
        reconnect_threshold_samples: 0
        post_end_energy_threshold: -5
      WakeSpeakerGate:
        enabled: true
        module: voice_gate/wake_speaker_gate_handler
        wake_word: "小伴小伴"
        kws_enabled: true
        kws_model_dir: "models/sherpa-onnx-kws-zipformer-wenetspeech-3.3M-2024-01-01-mobile"
        kws_auto_download: true
        kws_model_url: "https://github.com/k2-fsa/sherpa-onnx/releases/download/kws-models/sherpa-onnx-kws-zipformer-wenetspeech-3.3M-2024-01-01-mobile.tar.bz2"
        kws_provider: "cpu"
        speaker_gate_enabled: true
        speaker_model_name: "iic/speech_eres2netv2_sv_zh-cn_16k-common"
        speaker_device: "cpu"
        speaker_threshold: 0.45
        speaker_borderline_threshold: 0.40
        speaker_soft_threshold: 0.45
        speaker_grace_ms: 12000
        speaker_grace_segments: 2
        idle_timeout_ms: 90000
        non_target_timeout_ms: 20000
        wake_enrollment_ms: 1200
        interrupt_probe_ms: 700
      SenseVoice:
        enabled: True
        module: asr/sensevoice/asr_handler_sensevoice
        model_name: "iic/SenseVoiceSmall"
        output_type_override:
          HUMAN_TEXT: HUMAN_DUPLEX_TEXT
      SmartTurnEOU:
        enabled: true
        module: vad/smart_turn_eou/eou_handler_smart_turn
        threshold: 0.8
        max_buffer_seconds: 300.0
        sample_rate: 16000
        model_path: "models/smart_turn/smart-turn-v3.1-cpu.onnx"
        input_type_override:
          HUMAN_AUDIO: HUMAN_DUPLEX_AUDIO
      SemanticTurnDetector:
        enabled: false
        module: llm/semantic_turn_detector/semantic_turn_detector_handler
        duplex_mode: true
        api_url: "https://api.deepseek.com"
        model_name: "deepseek-v4-flash"
        enable_interrupt_detection: true
        interrupt_on_any_speech: false
        min_text_length_for_interrupt: 2
        enable_completion_detection: false
        min_text_length_for_completion: 1
        interrupt_judge_api_url: "https://api.deepseek.com"
        interrupt_judge_model_name: "deepseek-v4-flash"
        request_timeout: 3.0
        max_context_turns: 3
      CosyVoice:
        enabled: True
        module: tts/bailian_tts/tts_handler_cosyvoice_bailian
        voice: "longanhuan_v3"
        model_name: "cosyvoice-v3-flash"
        instruction: "请用四川话表达。"
        # api_key: "" # default=os.getenv("DASHSCOPE_API_KEY")
      LLMOpenAICompatible:
        enabled: True
        module: llm/openai_compatible/llm_handler_openai_compatible
        model_name: "deepseek-v4-flash"
        enable_video_input: False
        history_length: 8
        enable_scopemem: True
        scopemem_store_path: "runtime/scopemem/memories.jsonl"
        scopemem_user_name: "User"
        scopemem_assistant_name: "Assistant"
        scopemem_top_k: 6
        scopemem_memory_max_chars: 1600
        scopemem_extract_batch_size: 8
        scopemem_clear_on_start: True
        api_url: "https://api.deepseek.com"
        web_search_mode: "bocha"  # off | dashscope | bocha，可由 start_realtime_human.sh 覆盖
        web_search_always: true
        web_search_timeout: 3.0
        web_search_result_limit: 5
        enable_emotional_support_skills: true
        emotional_support_skill_bank_dir: "esc_skill_bank_agent_package/skill_bank"
        emotional_support_max_chars: 1800
        emotional_support_history_turns: 4
        # bocha_api_key: "" # default=os.getenv("BOCHA_API_KEY")
        # api_key: "" # default=os.getenv("DEEPSEEK_API_KEY")
      # === FlashHead 数字人 Avatar (Lite 模式) ===
      FlashHead:
        module: avatar/flashhead/avatar_handler_flashhead
        ckpt_dir: "models/SoulX-FlashHead-1_3B"
        wav2vec_dir: "models/wav2vec2-base-960h"
        model_type: "lite"
        cond_image_path: "resource/avatar/flashhead/girl.png"  # 替换为你的图像
        fps: 25
        base_seed: 42
        use_face_crop: false
        debug: false
        idle_noise_amplitude: 0.003
